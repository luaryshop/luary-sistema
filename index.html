<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LUARY • Sistema Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{background:#0b0b0b;color:white}
.card{background:#111;border-radius:20px;padding:20px}
</style>
</head>

<body class="p-6">

<a href="editor.html" class="text-[#caa85c]">→ Editor</a>

<h1 class="text-4xl font-bold mb-8">LUARY DASHBOARD</h1>

<div id="produtos" class="grid grid-cols-3 gap-6"></div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDP...",
authDomain: "catalogo-abella-joias.firebaseapp.com",
databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com",
projectId: "catalogo-abella-joias"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

firebase.auth().signInAnonymously();

db.ref('luary_produtos').on('value',snap=>{

let html='';

snap.forEach(c=>{
const p=c.val();

html+=`
<div class="card hover:scale-105 transition">
<img src="${p.foto||''}" class="w-full h-40 object-cover rounded mb-4">
<h2 class="text-lg font-bold">${p.nome}</h2>
<p class="text-sm text-gray-400">${p.sku}</p>
<p class="text-green-400 mt-2">R$ ${Number(p.custoBase||0).toFixed(2)}</p>
</div>`;
});

document.getElementById('produtos').innerHTML=html;

});
</script>

</body>
</html>
