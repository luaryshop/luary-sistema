<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Simulador LUARY</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{background:#0b0b0b;color:white}
</style>
</head>

<body class="p-6">

<a href="editor.html">→ Ir para Editor</a>

<h1 class="text-2xl mb-6">SIMULADOR LUARY</h1>

<select id="produtos" class="bg-black border p-2 mb-4"></select>

<div id="resultado"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com",
  projectId: "catalogo-abella-joias",
  storageBucket: "catalogo-abella-joias.firebasestorage.app",
  messagingSenderId: "727568435294",
  appId: "1:727568435294:web:442c0179ecf0686dff4ccf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

auth.signInAnonymously();

let produtos = [];

db.ref('luary_produtos').on('value',snap=>{
produtos=[];
let select=document.getElementById('produtos');
select.innerHTML='';

snap.forEach(c=>{
const p = c.val();
produtos.push(p);

const opt=document.createElement('option');
opt.value=c.key;
opt.text=p.nome;
select.appendChild(opt);
});

calcular();
});

document.getElementById('produtos').onchange = calcular;

function calcular(){
const id=document.getElementById('produtos').value;
const p=produtos.find(x=>x.nome && x);

if(!p) return;

const custo = Number(p.custoBase||0);
const margem = 2;

const preco = custo * margem;

document.getElementById('resultado').innerHTML=`
<div class="mt-4 p-4 bg-[#111] rounded">
<p>Produto: ${p.nome}</p>
<p>Custo: R$ ${custo.toFixed(2)}</p>
<p>Preço sugerido: R$ ${preco.toFixed(2)}</p>
</div>
`;
}
</script>

</body>
</html>
