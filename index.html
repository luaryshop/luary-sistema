<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luary Sistema</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body { background:#0f172a; }
.card { @apply bg-white rounded-3xl p-6 shadow-lg; }
</style>
</head>

<body class="flex h-screen text-slate-800">

<!-- SIDEBAR -->
<div class="w-72 bg-white p-6 flex flex-col gap-6">
  <h1 class="text-2xl font-black">LUARY <span class="text-indigo-600">SHOP</span></h1>

  <button onclick="trocar('dashboard')" class="btn">Dashboard</button>
  <button onclick="trocar('produtos')" class="btn">Produtos</button>
</div>

<!-- MAIN -->
<div class="flex-1 p-8 overflow-auto">

<!-- DASHBOARD -->
<div id="dashboard">

<h2 class="text-3xl font-black mb-6">Simulador</h2>

<input id="busca" placeholder="Buscar produto..."
class="w-full p-4 rounded-xl mb-6 border"/>

<div id="resultado"></div>

<div id="canais" class="grid grid-cols-3 gap-6 mt-6"></div>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
firebase.auth().signInAnonymously();

let produtos=[], insumos=[], banhos=[], canais=[];

function sync(path, setter){
  db.ref(path).on('value', snap=>{
    const data = snap.val() || {};
    setter(Object.keys(data).map(id=>({id,...data[id]})));
  });
}

sync('luary_produtos', v=>produtos=v);
sync('luary_insumos', v=>insumos=v);
sync('luary_banhos', v=>banhos=v);
sync('luary_marketplaces', v=>canais=v);

document.getElementById('busca').oninput = e=>{
  const q = e.target.value.toLowerCase();
  const p = produtos.find(x => x.nome?.toLowerCase().includes(q));
  if(p) calcular(p);
};

function calcular(p){

const pInsumos = (p.insumosIds||[]).map(id=>insumos.find(i=>i.id==id)).filter(Boolean);

const custoInsumos = pInsumos.reduce((a,i)=>a+Number(i.custo||0),0);

const pesoBanho = Number(p.pesoBase||0) +
pInsumos.filter(i=>i.somarAoBanho).reduce((a,i)=>a+Number(i.peso||0),0);

const banho = banhos.find(b=>b.id==p.banhoId);
const custoBanho = pesoBanho * Number(banho?.precoPorGrama||0);

const custoTotal = Number(p.custoBase||0) + custoInsumos + custoBanho;

document.getElementById('resultado').innerHTML = `
<div class="card">
<img src="${p.foto||''}" class="w-full h-60 object-cover rounded-xl mb-4"/>
<h3 class="text-xl font-bold">${p.nome}</h3>
<p>Custo Total: R$ ${custoTotal.toFixed(2)}</p>
</div>
`;

let html = '';

canais.forEach(m=>{
const taxa = (m.comissao+m.ads+m.imposto)/100;
const fixo = m.taxaFixa + m.freteMedia;

let preco = 0;

if(p.tipoMargem=='valor'){
preco = (custoTotal + fixo + Number(p.margemAlvo)) / (1 - taxa);
}else{
preco = (custoTotal + fixo) / (1 - taxa - (p.margemAlvo/100));
}

const lucro = preco - (preco*taxa) - custoTotal - fixo;

html += `
<div class="card">
<h4 class="font-bold">${m.nome}</h4>
<p>Preço: R$ ${preco.toFixed(2)}</p>
<p class="text-green-600 font-bold">Lucro: R$ ${lucro.toFixed(2)}</p>
</div>
`;
});

document.getElementById('canais').innerHTML = html;
}

function trocar(t){
document.getElementById('dashboard').style.display='block';
}
</script>

<style>
.btn{
padding:12px;
border-radius:12px;
background:#f1f5f9;
font-weight:bold;
text-align:left;
}
.btn:hover{
background:#6366f1;
color:white;
}
</style>

</body>
</html>
