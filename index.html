<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luary - Precificação</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

</head>

<body class="bg-slate-100 p-8">

<h1 class="text-3xl font-black mb-6">PRECIFICADOR LUARY</h1>

<input id="busca" placeholder="Buscar produto..."
class="w-full p-4 rounded-xl border mb-6"/>

<div id="resultado"></div>
<div id="canais" class="grid grid-cols-3 gap-6 mt-6"></div>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
firebase.auth().signInAnonymously();

let produtos=[], insumos=[], banhos=[], canais=[];

function sync(path, setter){
  db.ref(path).on('value', snap=>{
    const data = snap.val() || {};
    setter(Object.keys(data).map(id=>({id,...data[id]})));
  });
}

sync('luary_produtos', v=>produtos=v);
sync('luary_insumos', v=>insumos=v);
sync('luary_banhos', v=>banhos=v);
sync('luary_marketplaces', v=>canais=v);

document.getElementById('busca').oninput = e=>{
  const q = e.target.value.toLowerCase();
  const p = produtos.find(x =>
    x.nome?.toLowerCase().includes(q) ||
    x.sku?.toLowerCase().includes(q)
  );
  if(p) calcular(p);
};

function calcular(p){

const pInsumos = (p.insumosIds||[])
.map(id=>insumos.find(i=>i.id==id))
.filter(Boolean);

const custoInsumos = pInsumos.reduce((a,i)=>a+Number(i.custo||0),0);

const pesoBanho = Number(p.pesoBase||0) +
pInsumos.filter(i=>i.somarAoBanho)
.reduce((a,i)=>a+Number(i.peso||0),0);

const banho = banhos.find(b=>b.id==p.banhoId);
const custoBanho = pesoBanho * Number(banho?.precoPorGrama||0);

const custoTotal = Number(p.custoBase||0) + custoInsumos + custoBanho;

document.getElementById('resultado').innerHTML = `
<div class="bg-white p-6 rounded-xl shadow">
<img src="${p.foto||''}" class="w-full h-60 object-cover rounded mb-4"/>
<h2 class="text-xl font-bold">${p.nome}</h2>
<p>SKU: ${p.sku}</p>
<p class="mt-2 font-bold">Custo Total: R$ ${custoTotal.toFixed(2)}</p>
</div>
`;

let html = '';

canais.forEach(m=>{
const taxa = (m.comissao+m.ads+m.imposto)/100;
const fixo = Number(m.taxaFixa||0) + Number(m.freteMedia||0);

let preco = 0;

if(p.tipoMargem=='valor'){
preco = (custoTotal + fixo + Number(p.margemAlvo)) / (1 - taxa);
}else{
preco = (custoTotal + fixo) / (1 - taxa - (p.margemAlvo/100));
}

const lucro = preco - (preco*taxa) - custoTotal - fixo;

html += `
<div class="bg-white p-6 rounded-xl shadow">
<h3 class="font-bold">${m.nome}</h3>
<p>Preço: R$ ${preco.toFixed(2)}</p>
<p class="text-green-600 font-bold">Lucro: R$ ${lucro.toFixed(2)}</p>
</div>
`;
});

document.getElementById('canais').innerHTML = html;
}
</script>

</body>
</html>
