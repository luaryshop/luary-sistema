<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor LUARY</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{background:#0b0b0b;color:white}
.input{background:#1a1a1a;border:1px solid #333;padding:6px;width:100%}
img{width:40px;height:40px;object-fit:cover}
</style>
</head>

<body class="p-4">

<a href="index.html">← Simulador</a>

<h1 class="text-xl mb-4">EDITOR LUARY</h1>

<button onclick="novo()" class="bg-white text-black px-4 py-2 mb-4">+ NOVO PRODUTO</button>

<table class="w-full text-xs">
<thead>
<tr>
<th>IMG</th>
<th>SKU</th>
<th>Nome</th>
<th>Custo</th>
<th>Peso</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDPBZSxW8XjtQmDMUknzAyIlFda51MvMJY",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com",
  projectId: "catalogo-abella-joias",
  storageBucket: "catalogo-abella-joias.firebasestorage.app",
  messagingSenderId: "727568435294",
  appId: "1:727568435294:web:442c0179ecf0686dff4ccf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();
const auth = firebase.auth();

auth.signInAnonymously();

function linha(id,p={}) {
return `
<tr data-id="${id}">
<td>
<img src="${p.foto||''}">
<input type="file" onchange="upload(this)">
</td>
<td><input class="input sku" value="${p.sku||''}"></td>
<td><input class="input nome" value="${p.nome||''}"></td>
<td><input class="input custo" value="${p.custoBase||0}"></td>
<td><input class="input peso" value="${p.pesoBase||0}"></td>
<td>
<button onclick="salvar(this)">💾</button>
<button onclick="del('${id}')">🗑️</button>
</td>
</tr>`;
}

function novo(){
const ref = db.ref('luary_produtos').push();
document.getElementById('tb').insertAdjacentHTML('afterbegin',linha(ref.key,{}));
}

function carregar(){
db.ref('luary_produtos').on('value',snap=>{
let html='';
snap.forEach(c=>{
html+=linha(c.key,c.val());
});
document.getElementById('tb').innerHTML=html;
});
}

async function upload(input){
const file = input.files[0];
if(!file) return;

const tr = input.closest('tr');
const id = tr.dataset.id;

const ref = storage.ref(`LuaryShop/produtos/${id}_${file.name}`);

await ref.put(file);
const url = await ref.getDownloadURL();

tr.querySelector('img').src = url;
await db.ref('luary_produtos/'+id+'/foto').set(url);
}

function salvar(btn){
const tr = btn.closest('tr');
const id = tr.dataset.id;

const data = {
sku: tr.querySelector('.sku').value,
nome: tr.querySelector('.nome').value,
custoBase: Number(tr.querySelector('.custo').value),
pesoBase: Number(tr.querySelector('.peso').value),
foto: tr.querySelector('img').src || ''
};

db.ref('luary_produtos/'+id).update(data);
}

function del(id){
if(confirm("Excluir?")){
db.ref('luary_produtos/'+id).remove();
}
}

carregar();
</script>

</body>
</html>
