<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LUARY • Editor Premium</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{background:#0b0b0b;color:white}
.card{background:#111;border-radius:16px;padding:16px}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold mb-6 text-[#caa85c]">EDITOR LUARY</h1>

<div class="card mb-6">
<input id="nome" placeholder="Nome" class="w-full mb-2 p-2 bg-black border">
<input id="sku" placeholder="SKU" class="w-full mb-2 p-2 bg-black border">
<input id="custo" placeholder="Custo" type="number" class="w-full mb-2 p-2 bg-black border">

<input type="file" id="foto" class="mb-4">

<button onclick="salvar()" class="bg-green-600 px-6 py-2">SALVAR</button>
</div>

<div id="lista"></div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDP...",
authDomain: "catalogo-abella-joias.firebaseapp.com",
databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com",
projectId: "catalogo-abella-joias",
storageBucket: "catalogo-abella-joias.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();
firebase.auth().signInAnonymously();

async function uploadImagem(file){
const ref = storage.ref('luary/produtos/'+Date.now());
await ref.put(file);
return await ref.getDownloadURL();
}

async function salvar(){

const nome = document.getElementById('nome').value;
const sku = document.getElementById('sku').value;
const custo = Number(document.getElementById('custo').value);
const file = document.getElementById('foto').files[0];

let url = '';

if(file){
url = await uploadImagem(file);
}

const id = crypto.randomUUID();

await db.ref('luary_produtos/'+id).set({
nome, sku, custoBase:custo, foto:url
});

alert("Salvo!");
}

db.ref('luary_produtos').on('value',snap=>{
let html='';

snap.forEach(c=>{
const p=c.val();

html+=`
<div class="card mb-3 flex gap-4 items-center">
<img src="${p.foto||''}" class="w-16 h-16 object-cover bg-black">
<div>
<p>${p.nome}</p>
<p class="text-xs text-gray-400">${p.sku}</p>
</div>
</div>`;
});

document.getElementById('lista').innerHTML=html;
});
</script>

</body>
</html>
