<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Editor Luary</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

</head>

<body class="bg-slate-100 p-8">

<h1 class="text-3xl font-black mb-6">EDITOR LUARY</h1>

<select id="tipo" class="p-3 border rounded mb-4">
<option value="luary_produtos">Produtos</option>
<option value="luary_insumos">Insumos</option>
<option value="luary_banhos">Banhos</option>
<option value="luary_marketplaces">Canais</option>
</select>

<form id="form" class="bg-white p-6 rounded-xl shadow space-y-4"></form>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
firebase.auth().signInAnonymously();

document.getElementById('tipo').onchange = render;
render();

function render(){
const tipo = document.getElementById('tipo').value;

let html = '';

if(tipo=='luary_produtos'){
html = `
<input name="nome" placeholder="Nome" class="input"/>
<input name="sku" placeholder="SKU" class="input"/>
<input name="foto" placeholder="URL da imagem" class="input"/>
<input name="custoBase" placeholder="Custo" type="number" step="0.01" class="input"/>
<input name="pesoBase" placeholder="Peso" type="number" step="0.01" class="input"/>
<input name="margemAlvo" placeholder="Margem" type="number" class="input"/>

<select name="tipoMargem" class="input">
<option value="perc">%</option>
<option value="valor">R$</option>
</select>
`;
}

if(tipo=='luary_insumos'){
html = `
<input name="nome" placeholder="Nome" class="input"/>
<input name="custo" placeholder="Custo" type="number" class="input"/>
<input name="peso" placeholder="Peso" type="number" class="input"/>
<label><input type="checkbox" name="somarAoBanho"/> Soma no banho</label>
`;
}

if(tipo=='luary_banhos'){
html = `
<input name="nome" placeholder="Nome" class="input"/>
<input name="precoPorGrama" placeholder="Preço/g" type="number" step="0.0001" class="input"/>
`;
}

if(tipo=='luary_marketplaces'){
html = `
<input name="nome" placeholder="Nome" class="input"/>
<input name="comissao" placeholder="Comissão %" type="number" class="input"/>
<input name="imposto" placeholder="Imposto %" type="number" class="input"/>
<input name="ads" placeholder="Ads %" type="number" class="input"/>
<input name="taxaFixa" placeholder="Taxa fixa" type="number" class="input"/>
<input name="freteMedia" placeholder="Frete médio" type="number" class="input"/>
`;
}

html += `<button class="bg-indigo-600 text-white p-3 rounded">Salvar</button>`;

document.getElementById('form').innerHTML = html;
}

document.getElementById('form').onsubmit = e=>{
e.preventDefault();

const tipo = document.getElementById('tipo').value;
const data = Object.fromEntries(new FormData(e.target));

const id = crypto.randomUUID();

if(data.somarAoBanho) data.somarAoBanho = true;

Object.keys(data).forEach(k=>{
if(!isNaN(data[k])) data[k]=Number(data[k]);
});

db.ref(tipo+'/'+id).set(data);

alert('Salvo!');
e.target.reset();
};
</script>

<style>
.input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
}
</style>

</body>
</html>
