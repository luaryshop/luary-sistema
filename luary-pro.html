<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LUARY PRO</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
body{background:#0b0b0b;color:white}
.card{background:#111;border-radius:20px;padding:20px}
.input{width:100%;padding:10px;border-radius:10px;background:#000;border:1px solid #333}
</style>
</head>

<body class="p-6">

<h1 class="text-3xl font-bold mb-2">PRECIFICAÇÃO LUARY</h1>
<p class="text-green-400 text-sm mb-6">● Sincronização ativa</p>

<!-- BUSCA -->
<input id="busca" placeholder="Buscar produto..."
class="input mb-6"/>

<div id="listaBusca"></div>

<!-- PRODUTO -->
<div id="produto" class="mt-6"></div>

<!-- CANAIS -->
<div id="canais" class="grid md:grid-cols-2 gap-4 mt-6"></div>

<hr class="my-10 border-gray-800">

<!-- EDITOR -->
<h2 class="text-2xl font-bold mb-4">EDITOR</h2>

<select id="tipo" class="input mb-4">
<option value="luary_produtos">Produtos</option>
<option value="luary_insumos">Insumos</option>
<option value="luary_banhos">Banhos</option>
<option value="luary_marketplaces">Canais</option>
</select>

<form id="form" class="card space-y-3"></form>

<script>
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "catalogo-abella-joias.firebaseapp.com",
  databaseURL: "https://catalogo-abella-joias-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
firebase.auth().signInAnonymously();

let produtos=[], insumos=[], banhos=[], canais=[];
let selecionado=null;

// 🔄 LOAD
db.ref('luary_produtos').on('value',s=>{
  produtos=[]; s.forEach(c=>produtos.push({id:c.key,...c.val()}));
});
db.ref('luary_insumos').on('value',s=>{
  insumos=[]; s.forEach(c=>insumos.push({id:c.key,...c.val()}));
});
db.ref('luary_banhos').on('value',s=>{
  banhos=[]; s.forEach(c=>banhos.push({id:c.key,...c.val()}));
});
db.ref('luary_marketplaces').on('value',s=>{
  canais=[]; s.forEach(c=>canais.push({id:c.key,...c.val()}));
});

// 🔍 BUSCA
busca.oninput = function(){
  const v=this.value.toLowerCase();

  const res=produtos
  .filter(p=>p.nome?.toLowerCase().includes(v)||p.sku?.toLowerCase().includes(v))
  .sort((a,b)=>a.sku?.localeCompare(b.sku));

  listaBusca.innerHTML = res.map(p=>`
    <div onclick="select('${p.id}')" class="p-3 bg-[#111] rounded mb-2 cursor-pointer hover:bg-[#222]">
      <b>${p.sku}</b> - ${p.nome}
    </div>
  `).join('');
};

function select(id){
  selecionado=produtos.find(p=>p.id==id);
  render();
}

// 🧠 CALCULO + UI
function render(){
  if(!selecionado) return;

  const p=selecionado;

  const pInsumos=(p.insumosIds||[]).map(id=>insumos.find(i=>i.id==id)).filter(Boolean);

  const custoInsumos=pInsumos.reduce((a,i)=>a+Number(i.custo||0),0);

  const pesoBanho = Number(p.pesoBase||0) +
    pInsumos.filter(i=>i.somarAoBanho).reduce((a,i)=>a+Number(i.peso||0),0);

  const banho = banhos.find(b=>b.id==p.banhoId);
  const custoBanho = pesoBanho * Number(banho?.precoPorGrama||0);

  const custoTotal = Number(p.custoBase||0)+custoInsumos+custoBanho;

  produto.innerHTML = `
  <div class="card max-w-md mx-auto">

    <img src="${p.foto||''}" class="w-full aspect-square object-cover rounded mb-4"/>

    <h2 class="text-xl font-bold">${p.nome}</h2>
    <p class="text-gray-400">${p.sku}</p>

    <div class="mt-6 space-y-2 text-sm">

      <p>Peça Base: <b>R$ ${Number(p.custoBase||0).toFixed(2)}</b></p>
      <p>Insumos: <b>R$ ${custoInsumos.toFixed(2)}</b></p>
      <p>Banho: <b>R$ ${custoBanho.toFixed(2)}</b></p>

      <hr class="border-gray-700">

      <p class="text-lg">Total: <b>R$ ${custoTotal.toFixed(2)}</b></p>
      <p>Peso envio: <b>${pesoBanho.toFixed(2)}g</b></p>

    </div>
  </div>
  `;

  canais.innerHTML = canais.map(m=>{
    const taxa=(m.comissao+m.ads+m.imposto)/100;
    const fixo=m.taxaFixa+m.freteMedia;

    let preco=0;

    if(p.tipoMargem==='valor'){
      preco=(custoTotal+fixo+Number(p.margemAlvo))/(1-taxa);
    }else{
      preco=(custoTotal+fixo)/(1-taxa-(p.margemAlvo/100));
    }

    const lucro=preco-(preco*taxa)-custoTotal-fixo;

    return `
    <div class="card">
      <h3 class="font-bold">${m.nome}</h3>
      <p>Comissão: ${m.comissao}%</p>
      <p>ADS: ${m.ads}%</p>

      <div class="mt-3">
        <p class="text-green-400 text-xl">R$ ${preco.toFixed(2)}</p>
        <p class="text-sm">Lucro: R$ ${lucro.toFixed(2)}</p>
      </div>
    </div>
    `;
  }).join('');
}

// 📝 EDITOR
tipo.onchange = renderForm;
renderForm();

function renderForm(){
  const t=tipo.value;

  let html='';

  if(t=='luary_insumos'){
    html=`
    <input name="nome" placeholder="Nome" class="input"/>
    <select name="categoria" class="input">
      <option>Peça Base</option>
      <option>Embalagem</option>
      <option>Mimo / Brinde</option>
      <option>Item Fixo</option>
    </select>
    <input name="custo" type="number" step="0.01" placeholder="Custo" class="input"/>
    <input name="peso" type="number" step="0.01" placeholder="Peso" class="input"/>
    <label><input type="checkbox" name="somarAoBanho"/> Soma no banho</label>
    `;
  }

  if(t=='luary_produtos'){
    html=`
    <input name="nome" placeholder="Nome" class="input"/>
    <input name="sku" placeholder="SKU" class="input"/>
    <input name="foto" placeholder="URL imagem" class="input"/>
    <input name="custoBase" type="number" step="0.01" placeholder="Custo" class="input"/>
    <input name="pesoBase" type="number" step="0.01" placeholder="Peso" class="input"/>
    <input name="margemAlvo" type="number" placeholder="Margem" class="input"/>

    <select name="tipoMargem" class="input">
      <option value="perc">%</option>
      <option value="valor">R$</option>
    </select>

    <select name="banhoId" class="input">
      <option value="">Selecione banho</option>
      ${banhos.map(b=>`<option value="${b.id}">${b.nome}</option>`).join('')}
    </select>

    <p>Insumos:</p>
    ${insumos.map(i=>`
      <label>
        <input type="checkbox" name="insumosSelect" value="${i.id}"/>
        ${i.nome} (R$ ${i.custo})
      </label>
    `).join('')}
    `;
  }

  if(t=='luary_banhos'){
    html=`
    <input name="nome" placeholder="Nome" class="input"/>
    <input name="precoPorGrama" type="number" step="0.0001" placeholder="Preço/g" class="input"/>
    `;
  }

  if(t=='luary_marketplaces'){
    html=`
    <input name="nome" placeholder="Nome" class="input"/>
    <input name="comissao" type="number" placeholder="Comissão" class="input"/>
    <input name="imposto" type="number" placeholder="Imposto" class="input"/>
    <input name="ads" type="number" placeholder="ADS" class="input"/>
    <input name="taxaFixa" type="number" placeholder="Taxa fixa" class="input"/>
    <input name="freteMedia" type="number" placeholder="Frete" class="input"/>
    `;
  }

  html+=`<button class="bg-indigo-600 w-full p-3 rounded">SALVAR</button>`;

  form.innerHTML=html;
}

// 💾 SALVAR
form.onsubmit=e=>{
  e.preventDefault();

  const t=tipo.value;
  const data=Object.fromEntries(new FormData(form));

  if(t=='luary_produtos'){
    data.insumosIds = Array.from(document.querySelectorAll("input[name='insumosSelect']:checked"))
      .map(el=>el.value);
  }

  if(data.somarAoBanho) data.somarAoBanho=true;

  Object.keys(data).forEach(k=>{
    if(data[k]!=='' && !isNaN(data[k])) data[k]=Number(data[k]);
  });

  const id=crypto.randomUUID();

  db.ref(t+'/'+id).set(data).then(()=>{
    form.reset();
    alert('Salvo com sucesso!');
  });
};
</script>

</body>
</html>
